<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Mindmap (Minimal)</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    #container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #f7fbff;
    }
    svg {
      width: 100%;
      height: 100%;
      cursor: grab;
      overflow: hidden;
    }
    svg:active {
      cursor: grabbing;
    }
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 4px;
      padding: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.2);
    }
    #controls button {
      font-size: 18px;
      width: 32px;
      height: 32px;
      margin: 0 2px;
      cursor: pointer;
    }
    .node {
      cursor: pointer;
    }
  </style>
</head>
<body>

    <div id="controls">
      <button id="zoom-in">＋</button>
      <button id="zoom-out">－</button>

  <!-- D3 for pan/zoom and node click handling -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const svg = d3.select("#mindmap-svg");
      const content = d3.select("#mindmap-group");

      // Zoom & pan
      const zoom = d3.zoom()
        .scaleExtent([0.5, 4])
        .on("zoom", (event) => {
          content.attr("transform", event.transform);
        });

      svg.call(zoom).on("dblclick.zoom", null);

      // Zoom buttons
      d3.select("#zoom-in").on("click", () => {
        svg.transition().call(zoom.scaleBy, 1.2);
      });
      d3.select("#zoom-out").on("click", () => {
        svg.transition().call(zoom.scaleBy, 0.8);
      });

      // Node click
      d3.selectAll(".node").on("click", function(event) {
        const cx = d3.select(this).attr("cx");
        const cy = d3.select(this).attr("cy");
        alert(`Node at (${cx}, ${cy}) clicked`);
      });
    });
  </script>
